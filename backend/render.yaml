services:
  - type: web
    name: travel-planner-backend
    runtime: python
    plan: starter # persistent disks require a paid plan (free tier has ephemeral storage only)
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    disk:
      name: travel-planner-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:////var/data/travel_planner.db
      - key: CORS_ORIGINS
        value: https://multi-agents-travel-planner.vercel.app
      - key: JWT_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
