version: '3.8'

services:
  db:
    # We use pgvector image as it includes Postgres and Vector searching capabilities out of the box
    image: ankane/pgvector:latest
    container_name: ai_travel_planner_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: travel_planner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
